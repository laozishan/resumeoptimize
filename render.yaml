services:
  - type: web
    name: resumeoptimize
    runtime: node
    plan: free
    rootDir: resume-mvp
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_MODEL
        value: deepseek-v4-flash
      - key: NODE_ENV
        value: production
